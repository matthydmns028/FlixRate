<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search movies, TV shows and anime on FlixRate."
    />
    <title>Search – FlixRate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="img/Logo.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/search.css" />
  </head>
  <body>
    <!-- ══════════════════ NAVBAR ══════════════════ -->
    <nav class="navbar navbar--solid" id="navbar">
      <a href="index.html" class="nav-logo"
        ><span>FLIX</span><span>RATE</span></a
      >
      <div class="nav-search" style="flex: 1; max-width: 360px">
        <form
          id="search-form"
          role="search"
          
        >
          <span class="search-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </span>
          <input
            type="search"
            id="search-input"
            placeholder="Search FlixRate…"
            autocomplete="off"
          />
        </form>
        <div id="search-results"></div>
      </div>
      <div class="nav-actions" id="nav-menu">
        <ul class="nav-links">
        <li><a href="browse.html?type=movie">Movies</a></li>
        <li><a href="browse.html?type=anime">Anime</a></li>
        <li><a href="browse.html?type=tv">TV Series</a></li>
        <li><a href="forum.html">Forum</a></li>
        <li><a href="watchlist.html">🔖 Watchlist</a></li>
      </ul>
        <div id="nav-user-area"></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- ══════════════════ MAIN ══════════════════ -->
    <main class="search-page">
      <!-- Hero -->
      <div class="search-hero">
        <div class="search-hero-label">🔍 Search Results</div>
        <h1 class="search-hero-query" id="search-hero-query">
          Search FlixRate
        </h1>
        <div class="search-hero-count" id="search-count-label"></div>
      </div>

      <!-- Big search bar -->
      <form class="search-page-form" id="search-page-form">
        <div class="search-page-input-wrap">
          <span class="search-page-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </span>
          <input
            type="search"
            class="search-page-input"
            id="search-page-input"
            placeholder="Search movies, TV shows, anime…"
            autocomplete="off"
          />
        </div>
        <button type="submit" class="search-page-submit">Search</button>
      </form>

      <!-- Type tabs -->
      <div class="search-tabs">
        <button class="search-tab active" data-type="all">🌍 All</button>
        <button class="search-tab" data-type="movie">🎬 Movies</button>
        <button class="search-tab" data-type="tv">📺 TV Shows</button>
        <button class="search-tab" data-type="anime">🎌 Anime</button>
      </div>

      <!-- Suggestions (shown when no query) -->
      <div class="search-suggestions" id="search-sugg-wrap">
        <div class="search-sugg-label">Popular searches</div>
        <div class="search-sugg-chips" id="search-sugg-chips"></div>
      </div>

      <!-- Results -->
      <div class="search-results-grid" id="search-results-grid"></div>

      <!-- Load more -->
      <div
        class="search-load-more"
        id="search-load-more-wrap"
        style="display: none"
      >
        <button class="search-more-btn" id="search-more-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
          Load More
        </button>
      </div>
    </main>

    <!-- ══════════════════ SCRIPTS ══════════════════ -->
    <script src="js/config.js"></script>
    <script type="module" src="js/firebase-init.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script><script src="js/global_search.js"></script>
    <script type="module" src="js/contextmenu.js"></script>
    <script src="js/search.js"></script>
    <script src="js/transitions.js"></script>
    <script>
      document.getElementById("nav-toggle")?.addEventListener("click", () => {
        document
          .getElementById("nav-menu")
          ?.classList.toggle("nav-menu--open");
      });
    </script>
  </body>
</html>
