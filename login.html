<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create your FlixRate account to rate movies, anime, and TV shows.">
  <title>Sign In – FlixRate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo">
      <a href="index.html" aria-label="FlixRate Home">
        <span>FLIX</span><span>RATE</span>
      </a>
    </div>

    <!-- Card -->
    <div class="login-card" role="main">

      <!-- Tab switcher -->
      <div class="login-tabs" role="tablist">
        <button class="login-tab-btn active" id="tab-login"
          role="tab" aria-selected="true" aria-controls="form-login"
          onclick="switchTab('login')">Sign In</button>
        <button class="login-tab-btn" id="tab-register"
          role="tab" aria-selected="false" aria-controls="form-register"
          onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Alert box -->
      <div id="form-alert" class="form-alert" role="alert"></div>

      <!-- ── Login Form ──────────────────────────────── -->
      <form class="login-form form--active" id="form-login"
        role="tabpanel" aria-labelledby="tab-login"
        novalidate onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label" for="login-email">Email or Username</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input type="text" id="login-email" class="form-input"
              placeholder="you@example.com or username" autocomplete="username" required>
          </div>
          <span class="form-error" id="login-email-err">Please enter a valid email or username.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="login-password" class="form-input"
              placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="form-pw-toggle"
              onclick="togglePw('login-password', this)" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="login-pw-err">Password is required.</span>
        </div>

        <button type="submit" class="form-submit" id="login-submit">Sign In</button>
      </form>

      <!-- ── Register Form ───────────────────────────── -->
      <form class="login-form" id="form-register"
        role="tabpanel" aria-labelledby="tab-register"
        novalidate onsubmit="handleRegister(event)">

        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="reg-username" class="form-input"
              placeholder="CoolAnimeWatcher99" autocomplete="username" required>
          </div>
          <span class="form-error" id="reg-username-err">Username must be at least 3 characters.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email address</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input type="email" id="reg-email" class="form-input"
              placeholder="you@example.com" autocomplete="email" required>
          </div>
          <span class="form-error" id="reg-email-err">Please enter a valid email.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="reg-password" class="form-input"
              placeholder="Min. 6 characters" autocomplete="new-password" required>
            <button type="button" class="form-pw-toggle"
              onclick="togglePw('reg-password', this)" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="reg-pw-err">Password must be at least 6 characters.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </span>
            <input type="password" id="reg-confirm" class="form-input"
              placeholder="Repeat password" autocomplete="new-password" required>
          </div>
          <span class="form-error" id="reg-confirm-err">Passwords do not match.</span>
        </div>

        <button type="submit" class="form-submit" id="reg-submit">Create Account</button>
      </form>

    </div><!-- /login-card -->

    <p class="login-back">
      <a href="index.html" aria-label="Back to home">← Back to FlixRate</a>
    </p>

  </div><!-- /login-wrapper -->

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ── Tab switching ──────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.login-form').forEach(f => f.classList.remove('form--active'));
      document.querySelectorAll('.login-tab-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      document.getElementById('form-' + tab).classList.add('form--active');
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).setAttribute('aria-selected', 'true');
      hideAlert();
    }

    // ── Password visibility toggle ─────────────────────────
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    // ── Alert helpers ──────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('form-alert');
      el.textContent = msg;
      el.className = `form-alert form-alert--${type}`;
    }
    function hideAlert() {
      const el = document.getElementById('form-alert');
      el.className = 'form-alert';
      el.textContent = '';
    }
    function showErr(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }
    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('visible'));
      hideAlert();
    }

    // ── Login handler ──────────────────────────────────────
    function handleLogin(e) {
      e.preventDefault();
      clearErrors();
      const credential = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      let valid      = true;

      if (!credential) {
        showErr('login-email-err', 'Please enter an email or username.'); valid = false;
      }
      if (!password) {
        showErr('login-pw-err', 'Password is required.'); valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('login-submit');
      btn.textContent = 'Signing in…'; btn.disabled = true;

      setTimeout(() => {
        const result = Auth.login(credential, password);
        btn.textContent = 'Sign In'; btn.disabled = false;
        if (result.success) {
          showAlert('Welcome back, ' + result.user.username + '! Redirecting…', 'success');
          setTimeout(() => window.location.href = 'index.html', 1200);
        } else {
          showAlert(result.message);
        }
      }, 600);
    }

    // ── Register handler ───────────────────────────────────
    function handleRegister(e) {
      e.preventDefault();
      clearErrors();
      const username = document.getElementById('reg-username').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      let valid      = true;

      if (username.length < 3) {
        showErr('reg-username-err', 'Username must be at least 3 characters.'); valid = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showErr('reg-email-err', 'Please enter a valid email.'); valid = false;
      }
      if (password.length < 6) {
        showErr('reg-pw-err', 'Password must be at least 6 characters.'); valid = false;
      }
      if (password !== confirm) {
        showErr('reg-confirm-err', 'Passwords do not match.'); valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('reg-submit');
      btn.textContent = 'Creating…'; btn.disabled = true;

      setTimeout(() => {
        const result = Auth.register(username, email, password);
        btn.textContent = 'Create Account'; btn.disabled = false;
        if (result.success) {
          showAlert('Account created! Welcome, ' + result.user.username + '! Redirecting…', 'success');
          setTimeout(() => window.location.href = 'index.html', 1200);
        } else {
          showAlert(result.message);
        }
      }, 700);
    }
  </script>

</body>
</html>
