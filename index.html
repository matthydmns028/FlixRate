<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FlixRate – Discover trending movies, TV shows, and anime. Rate, review, and explore entertainment all in one place."
    />
    <title>FlixRate – Discover Movies, TV & Anime</title>
    <link rel="icon" type="image/png" href="img/Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/hero.css" />
    <script src="js/transitions.js"></script>
  </head>
  <body>
    <!-- ══════════════════════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════════════════════ -->
    <nav class="navbar" id="navbar">
      <a href="index.html" class="nav-logo" aria-label="FlixRate Home">
        <span>FLIX</span><span>RATE</span>
      </a>

      <!-- Search -->
      <div class="nav-search">
        <form
          id="search-form"
          role="search"
          
          aria-label="Search FlixRate"
        >
          <span class="search-icon" aria-hidden="true">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </span>
          <input
            type="search"
            id="search-input"
            placeholder="Search movies, anime, shows…"
            autocomplete="off"
            aria-label="Search"
          />
        </form>
        <div
          id="search-results"
          role="listbox"
          aria-label="Search results"
        ></div>
      </div>

      <div class="nav-actions" id="nav-menu">
        <!-- Nav links -->
        <ul class="nav-links" role="navigation">
          <li><a href="browse.html?type=movie">Movies</a></li>
          <li><a href="browse.html?type=anime">Anime</a></li>
          <li><a href="browse.html?type=tv">TV Series</a></li>
          <li><a href="forum.html">Forum</a></li>
          <li><a href="watchlist.html">📛 Watchlist</a></li>
        </ul>

        <!-- User area -->
        <div id="nav-user-area">
          <!-- Populated by auth.js -->
        </div>
      </div>

      <!-- Mobile toggle -->
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- ══════════════════════════════════════════════════════════
       HERO SECTION
  ══════════════════════════════════════════════════════════ -->
    <section id="hero" aria-label="Featured content">
      <!-- Backdrop -->
      <div id="hero-backdrop" role="img" aria-label="Hero backdrop image"></div>

      <!-- Dynamic color glow -->
      <div class="hero-color-glow"></div>

      <!-- Content -->
      <div class="hero-content">
        <!-- Poster -->
        <div class="hero-poster-wrap">
          <div class="hero-poster-shadow">
            <img
              id="hero-poster"
              src=""
              alt="Poster"
              width="180"
              height="270"
            />
          </div>
        </div>

        <!-- Text -->
        <div class="hero-text">
          <div
            id="hero-type-badge"
            class="hero-type-badge hero-type-badge--movie"
          >
            🎬 MOVIE
          </div>
          <h1 id="hero-title">Loading…</h1>
          <div id="hero-meta" aria-label="Rating information"></div>
          <p id="hero-overview"></p>

          <div class="hero-buttons">
            <button id="hero-trailer-btn" aria-label="Watch trailer">
              <span class="btn-play-icon">
                <svg width="10" height="12" viewBox="0 0 10 12" fill="white">
                  <polygon points="0,0 10,6 0,12" />
                </svg>
              </span>
              Watch Trailer
            </button>
            <button id="hero-list-btn" aria-label="Add to my list">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add to List
            </button>
          </div>
        </div>
      </div>

      <!-- Carousel controls -->
      <div class="hero-controls">
        <button class="hero-nav-btn" id="hero-prev" aria-label="Previous slide">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <polyline points="15,18 9,12 15,6" />
          </svg>
        </button>
        <div id="hero-dots" role="tablist" aria-label="Hero slides"></div>
        <button class="hero-nav-btn" id="hero-next" aria-label="Next slide">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <polyline points="9,18 15,12 9,6" />
          </svg>
        </button>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT – Rows
  ══════════════════════════════════════════════════════════ -->
    <main class="site-content">
      <!-- ── Trending Movies ───────────────────────────────── -->
      <section
        class="content-section"
        id="section-movies"
        aria-labelledby="title-trending-movies"
      >
        <div class="section-header">
          <h2 class="section-title" id="title-trending-movies">
            Trending Movies
          </h2>
          <a href="browse.html?type=movie" class="section-see-all">See all →</a>
        </div>
        <div class="content-row" id="row-trending-movies">
          <button class="row-arrow row-prev" aria-label="Scroll left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15,18 9,12 15,6" />
            </svg>
          </button>
          <div class="row-track">
            <!-- Cards injected by app.js -->
            <div class="row-skeleton-wrap">
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
            </div>
          </div>
          <button class="row-arrow row-next" aria-label="Scroll right">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9,18 15,12 9,6" />
            </svg>
          </button>
        </div>
      </section>

      <!-- ── Top Anime ─────────────────────────────────────── -->
      <section
        class="content-section"
        id="section-anime"
        aria-labelledby="title-top-anime"
      >
        <div class="section-header">
          <h2 class="section-title" id="title-top-anime">Top Anime</h2>
          <a href="browse.html?type=anime" class="section-see-all">See all →</a>
        </div>
        <div class="content-row" id="row-top-anime">
          <button class="row-arrow row-prev" aria-label="Scroll left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15,18 9,12 15,6" />
            </svg>
          </button>
          <div class="row-track">
            <div class="row-skeleton-wrap">
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
            </div>
          </div>
          <button class="row-arrow row-next" aria-label="Scroll right">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9,18 15,12 9,6" />
            </svg>
          </button>
        </div>
      </section>

      <!-- ── Trending TV ───────────────────────────────────── -->
      <section
        class="content-section"
        id="section-tv"
        aria-labelledby="title-trending-tv"
      >
        <div class="section-header">
          <h2 class="section-title" id="title-trending-tv">
            Trending TV Series
          </h2>
          <a href="browse.html?type=tv" class="section-see-all">See all →</a>
        </div>
        <div class="content-row" id="row-trending-tv">
          <button class="row-arrow row-prev" aria-label="Scroll left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15,18 9,12 15,6" />
            </svg>
          </button>
          <div class="row-track">
            <div class="row-skeleton-wrap">
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
            </div>
          </div>
          <button class="row-arrow row-next" aria-label="Scroll right">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9,18 15,12 9,6" />
            </svg>
          </button>
        </div>
      </section>

      <!-- ── Seasonal Anime ────────────────────────────────── -->
      <section class="content-section" aria-labelledby="title-seasonal">
        <div class="section-header">
          <h2 class="section-title" id="title-seasonal">This Season's Anime</h2>
          <a href="browse.html?type=anime" class="section-see-all">See all →</a>
        </div>
        <div class="content-row" id="row-seasonal-anime">
          <button class="row-arrow row-prev" aria-label="Scroll left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15,18 9,12 15,6" />
            </svg>
          </button>
          <div class="row-track">
            <div class="row-skeleton-wrap">
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
              <div class="row-skeleton"></div>
            </div>
          </div>
          <button class="row-arrow row-next" aria-label="Scroll right">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9,18 15,12 9,6" />
            </svg>
          </button>
        </div>
      </section>
    </main>

    <!-- ══════════════════════════════════════════════════════════
       TRAILER MODAL
  ══════════════════════════════════════════════════════════ -->
    <div
      id="trailer-modal"
      role="dialog"
      aria-modal="true"
      aria-label="Trailer player"
    >
      <div class="modal-container">
        <button id="trailer-modal-close" aria-label="Close trailer">✕</button>
        <iframe
          id="trailer-iframe"
          title="Trailer"
          allowfullscreen
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
        >
        </iframe>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════════════════ -->
    <footer class="site-footer">
      <a href="index.html" class="footer-logo">
        <span>FLIX</span><span style="color: var(--text-primary)">RATE</span>
      </a>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#">About</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">Contact</a>
        <a href="forum.html">Forum</a>
      </nav>
      <p class="footer-copy">
        © 2026 FlixRate. Data provided by
        <a
          href="https://www.themoviedb.org/"
          target="_blank"
          rel="noopener"
          style="color: var(--accent-light)"
          >TMDB</a
        >
        &amp;
        <a
          href="https://jikan.moe/"
          target="_blank"
          rel="noopener"
          style="color: var(--accent-light)"
          >Jikan</a
        >.
      </p>
    </footer>

    <!-- ══════════════════════════════════════════════════════════
       SCRIPTS  (order matters)
  ══════════════════════════════════════════════════════════ -->
    <script src="js/config.js"></script>

    <script type="module" src="js/firebase-init.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/api.js"></script>
    <script src="js/global_search.js"></script>
    <script src="js/colorExtractor.js"></script>
    <script src="js/hero.js"></script>
    <script type="module" src="js/contextmenu.js"></script>

    <script src="js/app.js"></script>
    <script src="js/transitions.js"></script>

    <!-- Navbar scroll effect -->
    <script>
      const navbar = document.getElementById("navbar");
      window.addEventListener(
        "scroll",
        () => {
          navbar.classList.toggle("navbar--solid", window.scrollY > 40);
        },
        { passive: true },
      );
    </script>

    <style>
      /* Skeleton loading placeholders */
      .row-skeleton-wrap {
        display: flex;
        gap: 16px;
      }
      .row-skeleton {
        flex: 0 0 160px;
        aspect-ratio: 2/3;
        border-radius: 12px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.08) 50%,
          rgba(255, 255, 255, 0.04) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </body>
</html>
